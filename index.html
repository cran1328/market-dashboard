<!DOCTYPE html>
<html>
<head>
  <title>Market Dashboard</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    h1 { color: #38bdf8; }
    .card {
      background: #1e293b;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }
    a { color: #22c55e; }
  </style>
</head>

<body>

<h1>🚀 Live Market Dashboard</h1>

<h2>📰 News Feed</h2>
<div id="news">Loading...</div>

<script>
window.onload = function() {

  async function fetchNews() {
    try {
      const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://rss.nytimes.com/services/xml/rss/nyt/Business.xml");
      const data = await res.json();

      const container = document.getElementById("news");
      container.innerHTML = "";

      data.items.forEach(item => {
        const div = document.createElement("div");
        div.className = "card";
        div.innerHTML = `
          <h3>${item.title}</h3>
          <a href="${item.link}" target="_blank">Read</a>
        `;
        container.appendChild(div);
      });

    } catch (err) {
      document.getElementById("news").innerHTML = "❌ Failed to load news";
      console.error(err);
    }
  }

  fetchNews();
  setInterval(fetchNews, 30000);
};
</script>

</body>
</html>
