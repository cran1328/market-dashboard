<!DOCTYPE html>
<html>
<head>
  <title>Market Pro Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0b1220;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 20px;
      background: #020617;
      color: #38bdf8;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 15px;
      padding: 15px;
    }

    .section {
      background: #111827;
      padding: 12px;
      border-radius: 12px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .card {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      background: #1f2937;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
      background: #374151;
    }

    .breaking {
      border-left: 4px solid red;
      background: #3b0a0a;
    }

    .card img {
      width: 110px;
      height: 75px;
      object-fit: cover;
      border-radius: 8px;
    }

    .title {
      font-size: 14px;
      font-weight: 500;
    }

    .time {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
    }

    .price {
      font-size: 13px;
      margin-bottom: 8px;
    }

    button {
      background: #1f2937;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 6px;
      margin-left: 5px;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<header>🚀 MARKET PRO DASHBOARD</header>

<div class="container">

  <!-- LEFT -->
  <div class="section">

    <div class="topbar">
      <div>🤖 <span id="bias">...</span></div>
      <div>💵 <span id="usd">...</span></div>
      <div>
        <button onclick="toggleImpact()">🔥</button>
        <button onclick="manualRefresh()">🔄</button>
      </div>
    </div>

    <div style="font-size:12px;color:#9ca3af;">
      Last updated: <span id="updated">--</span>
    </div>

    <div id="prices"></div>
    <div id="news"></div>

  </div>

  <!-- RIGHT -->
  <div class="section">
    <h3>⚡ Breaking News</h3>
    <div id="tweets"></div>
  </div>

</div>

<script>
let showHighImpact = false;

function toggleImpact() {
  showHighImpact = !showHighImpact;
  fetchNews();
}

function manualRefresh() {
  fetchNews();
  fetchTweets();
  fetchPrices();
}

function formatTime(date) {
  const now = new Date();
  const diff = Math.floor((now - date) / 60000);

  if (diff < 1) return "Just now 🔴";
  if (diff < 60) return diff + " min ago";
  return Math.floor(diff/60) + " hr ago";
}

// ===== NEWS =====
async function fetchNews() {
  const sources = [
    "https://www.fxstreet.com/rss/news",
    "https://www.forexlive.com/feed/",
    "https://www.coindesk.com/arc/outboundfeeds/rss/"
  ];

  let allNews = [];

  for (let src of sources) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${src}&_=${Date.now()}`);
      const data = await res.json();
      if (data.items) allNews = allNews.concat(data.items);
    } catch {}
  }

  allNews.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));

  const container = document.getElementById("news");
  container.innerHTML = "";

  let bullish = 0, bearish = 0, usdStrong = 0, usdWeak = 0;

  allNews.slice(0, 20).forEach(item => {

    const title = item.title.toLowerCase();

    const isHigh =
      title.includes("cpi") ||
      title.includes("nfp") ||
      title.includes("fed") ||
      title.includes("inflation") ||
      title.includes("rate");

    if (showHighImpact && !isHigh) return;

    const time = new Date(item.pubDate);

    if (title.includes("hawkish") || title.includes("inflation")) bearish++;
    if (title.includes("dovish") || title.includes("stimulus")) bullish++;

    if (title.includes("usd strength")) usdStrong++;
    if (title.includes("usd weakness")) usdWeak++;

    const div = document.createElement("div");
    div.className = "card";

    if ((new Date() - time) < 120000) div.classList.add("breaking");

    div.onclick = () => window.open(item.link, "_blank");

    div.innerHTML = `
      <img src="${item.thumbnail || 'https://via.placeholder.com/110'}">
      <div>
        <div class="title">${item.title}</div>
        <div class="time">${time.toLocaleTimeString()} • ${formatTime(time)}</div>
      </div>
    `;

    container.appendChild(div);
  });

  document.getElementById("bias").innerText =
    bearish > bullish ? "Bearish 📉" :
    bullish > bearish ? "Bullish 📈" : "Neutral";

  document.getElementById("usd").innerText =
    usdStrong > usdWeak ? "USD Strong 💪" :
    usdWeak > usdStrong ? "USD Weak 📉" : "USD Neutral";

  document.getElementById("updated").innerText =
    new Date().toLocaleTimeString();
}

// ===== BREAKING =====
async function fetchTweets() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://nitter.net/financialjuice/rss&_=" + Date.now());
    const data = await res.json();

    const container = document.getElementById("tweets");
    container.innerHTML = "";

    data.items.slice(0,6).forEach(item => {
      const time = new Date(item.pubDate);

      const div = document.createElement("div");
      div.className = "card";

      div.onclick = () => window.open(item.link, "_blank");

      div.innerHTML = `
        <div>
          <div class="title">${item.title}</div>
          <div class="time">${time.toLocaleTimeString()} • ${formatTime(time)}</div>
        </div>
      `;

      container.appendChild(div);
    });

  } catch {}
}

// ===== PRICES =====
async function fetchPrices() {
  try {
    const btc = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
    const btcData = await btc.json();

    const gold = await fetch("https://api.metals.live/v1/spot/gold");
    const goldData = await gold.json();

    const fx = await fetch("https://api.exchangerate.host/latest?base=EUR&symbols=USD");
    const fxData = await fx.json();

    document.getElementById("prices").innerHTML = `
      <div class="price">🟡 Gold: $${goldData[0].price}</div>
      <div class="price">₿ BTC: $${btcData.bitcoin.usd}</div>
      <div class="price">💱 EURUSD: ${fxData.rates.USD}</div>
    `;
  } catch {}
}

// RUN
manualRefresh();

setInterval(() => {
  manualRefresh();
}, 20000);
</script>

</body>
</html>
