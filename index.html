<!DOCTYPE html>
<html>
<head>
  <title>INSTITUTIONAL DASHBOARD</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    header {
      padding: 12px;
      text-align: center;
      background: #020617;
      color: #38bdf8;
      font-weight: bold;
      font-size: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 10px;
      padding: 10px;
    }

    .section {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
    }

    .card {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      background: #1f2937;
      padding: 8px;
      border-radius: 6px;
    }

    .breaking {
      background: #3b0a0a;
      border-left: 3px solid red;
    }

    .time {
      font-size: 11px;
      color: #9ca3af;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 8px;
    }

    button {
      background: #1f2937;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 5px;
    }

    .meter {
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<header>🏦 INSTITUTIONAL MARKET DASHBOARD</header>

<div class="container">

  <!-- LEFT -->
  <div class="section">

    <div class="topbar">
      <div>🤖 Bias: <span id="bias">...</span></div>
      <div>💵 USD: <span id="usd" class="meter">...</span></div>
      <button onclick="toggleImpact()">🔥 Impact</button>
    </div>

    <div id="prices"></div>

    <div id="news"></div>

  </div>

  <!-- RIGHT -->
  <div class="section">
    <h4>⚡ Breaking Feed</h4>
    <div id="tweets"></div>
  </div>

</div>

<script>
let showHighImpact = false;
let lastNewsTime = 0;
const sound = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

function toggleImpact() {
  showHighImpact = !showHighImpact;
  fetchNews();
}

// ===== NEWS =====
async function fetchNews() {
  const sources = [
    "https://www.fxstreet.com/rss/news",
    "https://www.forexlive.com/feed/",
    "https://www.coindesk.com/arc/outboundfeeds/rss/"
  ];

  let allNews = [];

  for (let src of sources) {
    try {
      const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${src}`);
      const data = await res.json();
      if (data.items) allNews = allNews.concat(data.items);
    } catch {}
  }

  allNews.sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate));

  const container = document.getElementById("news");
  container.innerHTML = "";

  let bullish = 0;
  let bearish = 0;
  let usdStrong = 0;
  let usdWeak = 0;

  allNews.slice(0, 30).forEach(item => {

    const title = item.title.toLowerCase();

    const isHigh =
      title.includes("cpi") ||
      title.includes("nfp") ||
      title.includes("fed") ||
      title.includes("inflation") ||
      title.includes("interest rate") ||
      title.includes("war");

    if (showHighImpact && !isHigh) return;

    const time = new Date(item.pubDate);
    const now = new Date();
    const diffMin = Math.floor((now - time) / 60000);

    let timeText = diffMin < 1 ? "🔴 NOW" :
                   diffMin < 60 ? diffMin + "m" :
                   Math.floor(diffMin/60) + "h";

    if (time > lastNewsTime && diffMin < 1) {
      sound.play().catch(()=>{});
    }

    // BIAS
    if (title.includes("hawkish") || title.includes("inflation") || title.includes("rate hike")) bearish++;
    if (title.includes("dovish") || title.includes("stimulus") || title.includes("rate cut")) bullish++;

    // USD METER
    if (title.includes("usd strength") || title.includes("strong dollar")) usdStrong++;
    if (title.includes("usd weakness") || title.includes("weak dollar")) usdWeak++;

    const div = document.createElement("div");
    div.className = "card";

    if (diffMin < 2) div.classList.add("breaking");

    div.innerHTML = `
      <div>
        <div>${item.title}</div>
        <div class="time">${timeText}</div>
      </div>
    `;

    container.appendChild(div);
  });

  lastNewsTime = new Date();

  // Bias
  document.getElementById("bias").innerText =
    bearish > bullish ? "Bearish 📉" :
    bullish > bearish ? "Bullish 📈" : "Neutral";

  // USD meter
  document.getElementById("usd").innerText =
    usdStrong > usdWeak ? "Strong 💪" :
    usdWeak > usdStrong ? "Weak 📉" : "Neutral";
}

// ===== TWITTER =====
async function fetchTweets() {
  try {
    const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://nitter.net/financialjuice/rss");
    const data = await res.json();

    const container = document.getElementById("tweets");
    container.innerHTML = "";

    data.items.slice(0,6).forEach(item => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<div>${item.title}</div>`;
      container.appendChild(div);
    });

  } catch {}
}

// ===== PRICES =====
async function fetchPrices() {
  try {
    const btc = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd");
    const btcData = await btc.json();

    const gold = await fetch("https://api.metals.live/v1/spot/gold");
    const goldData = await gold.json();

    const fx = await fetch("https://api.exchangerate.host/latest?base=EUR&symbols=USD");
    const fxData = await fx.json();

    document.getElementById("prices").innerHTML = `
      🟡 Gold: $${goldData[0].price} |
      ₿ BTC: $${btcData.bitcoin.usd} |
      💱 EURUSD: ${fxData.rates.USD}
    `;
  } catch {}
}

// RUN
fetchNews();
fetchTweets();
fetchPrices();

setInterval(fetchNews, 20000);
setInterval(fetchTweets, 15000);
setInterval(fetchPrices, 20000);
</script>

</body>
</html>
