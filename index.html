<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>NEXUS EDGE — AI Market Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--s1:#111520;--s2:#161c28;--s3:#1c2436;--s4:#212d42;
  --bd:#1e2a3d;--bd2:#273548;--bd3:#2f3f58;
  --v:#6366f1;--v2:#818cf8;--vd:rgba(99,102,241,.1);--vg:rgba(99,102,241,.25);
  --em:#10b981;--emd:rgba(16,185,129,.1);--emg:rgba(16,185,129,.25);
  --re:#ef4444;--red:rgba(239,68,68,.1);--reg:rgba(239,68,68,.25);
  --am:#f59e0b;--amd:rgba(245,158,11,.1);--amg:rgba(245,158,11,.25);
  --or:#f97316;--ord:rgba(249,115,22,.1);
  --t1:#e8edf5;--t2:#94a3b8;--t3:#4a5a72;
  --ff:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--ff);font-size:13px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
button{font-family:var(--ff);cursor:pointer}
a{text-decoration:none;color:inherit}

/* ══ APP SHELL ══════════════════════════════════════════ */
#app{display:grid;grid-template-columns:210px 1fr;grid-template-rows:52px 1fr 24px;height:100vh;width:100vw}
#sidebar{grid-row:1/4;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
#topbar{grid-column:2;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;gap:12px;overflow:hidden}
#viewport{grid-column:2;overflow:hidden;position:relative}
#statusbar{grid-column:2;background:var(--s1);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:14px;overflow:hidden}

/* ══ SIDEBAR ════════════════════════════════════════════ */
.sb-brand{height:52px;display:flex;align-items:center;gap:10px;padding:0 14px;border-bottom:1px solid var(--bd);flex-shrink:0;cursor:pointer}
.sb-logo{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--v),var(--v2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;box-shadow:0 0 16px rgba(99,102,241,.3)}
.sb-name{font-weight:700;font-size:13px;letter-spacing:-.01em;color:var(--t1)}
.sb-tag{font-size:8px;color:var(--t3);font-family:var(--fm);letter-spacing:.1em;margin-top:1px}
.sb-body{flex:1;overflow-y:auto;padding:6px 0}
.sb-section{margin-bottom:2px}
.sb-sep{font-size:9px;font-weight:600;letter-spacing:.12em;color:var(--t3);text-transform:uppercase;font-family:var(--fm);padding:8px 14px 3px}
.sn{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;color:var(--t2);font-size:12px;font-weight:500;transition:all .13s;border-left:3px solid transparent;user-select:none;position:relative}
.sn:hover{background:var(--s2);color:var(--t1)}
.sn.on{background:var(--vd);color:var(--v2);border-left-color:var(--v)}
.sn-i{width:16px;text-align:center;flex-shrink:0;font-size:13px}
.sn-l{flex:1}
.sn-b{font-size:9px;font-family:var(--fm);font-weight:700;padding:1px 6px;border-radius:3px;flex-shrink:0}
.sn-b.new{background:var(--v);color:#fff}
.sn-b.live{background:var(--re);color:#fff;animation:pulse 1.5s infinite}
.sn-b.hot{background:var(--or);color:#fff}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sn.war{color:#fca5a5}.sn.war:hover{background:var(--red)}.sn.war.on{background:var(--red);color:var(--re);border-left-color:var(--re)}
.sb-div{height:1px;background:var(--bd);margin:4px 14px}
.sb-foot{flex-shrink:0;border-top:1px solid var(--bd);padding:6px 0}

/* ══ TOPBAR ═════════════════════════════════════════════ */
.tb-greet{flex:1;min-width:0}
.tb-t{font-size:14px;font-weight:700;letter-spacing:-.01em}
.tb-d{font-size:10px;color:var(--t3);font-family:var(--fm);margin-top:1px}
#ticker-box{flex:1;max-width:480px;overflow:hidden;mask-image:linear-gradient(to right,transparent,black 5%,black 95%,transparent)}
#ticker-inner{display:flex;gap:20px;animation:scroll 55s linear infinite;white-space:nowrap}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tk{font-family:var(--fm);font-size:10px;display:flex;align-items:center;gap:5px;color:var(--t3)}
.tk .s{color:var(--t2);font-weight:600}.tk .p{color:var(--t1)}.tk .u{color:var(--em)}.tk .d{color:var(--re)}
.tb-actions{display:flex;align-items:center;gap:7px;flex-shrink:0}
.btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid;transition:all .13s;background:none;white-space:nowrap}
.btn.pri{background:var(--vd);border-color:var(--vg);color:var(--v2)}.btn.pri:hover{background:rgba(99,102,241,.18)}
.btn.sec{background:var(--s2);border-color:var(--bd);color:var(--t2)}.btn.sec:hover{border-color:var(--bd2);color:var(--t1)}
.btn.war{background:var(--red);border-color:var(--reg);color:var(--re)}
.btn .rot{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.notif-btn{position:relative}.ndot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--re);border:1px solid var(--s1)}

/* ══ VIEWPORT / PAGES ═══════════════════════════════════ */
#viewport{overflow:hidden}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;padding:14px;display:none}
.page.show{display:block}

/* ══ STATUS BAR ════════════════════════════════════════ */
.si{font-family:var(--fm);font-size:10px;color:var(--t3);display:flex;align-items:center;gap:4px;white-space:nowrap}
.si.ok{color:var(--em)}.si.warn{color:var(--am)}.si.red{color:var(--re)}
.sdiv{width:1px;height:10px;background:var(--bd);flex-shrink:0}

/* ══ LAYOUT HELPERS ════════════════════════════════════ */
.row{display:grid;gap:12px}.row2{grid-template-columns:1fr 1fr}.row3{grid-template-columns:1fr 1fr 1fr}.row-main{grid-template-columns:1fr 340px}.row-wide{grid-template-columns:1fr 1fr 320px}
.col{display:flex;flex-direction:column;gap:12px}
.span2{grid-column:1/-1}
.mb12{margin-bottom:12px}

/* ══ CARD ════════════════════════════════════════════ */
.card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;overflow:hidden}
.card.war{background:linear-gradient(135deg,rgba(239,68,68,.05),var(--s2));border-color:rgba(239,68,68,.2)}
.ch{padding:10px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0}
.ch-t{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;color:var(--t1)}
.ch-r{display:flex;align-items:center;gap:5px}
.tag{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;font-family:var(--fm);border:1px solid;cursor:pointer;transition:all .13s;user-select:none}
.tag.g{color:var(--em);border-color:var(--emg);background:var(--emd)}
.tag.r{color:var(--re);border-color:var(--reg);background:var(--red)}
.tag.y{color:var(--am);border-color:var(--amg);background:var(--amd)}
.tag.p{color:var(--v2);border-color:var(--vg);background:var(--vd)}
.tag.ghost{color:var(--t2);border-color:var(--bd2);background:none}
.tag.ghost:hover{color:var(--t1);border-color:var(--bd3)}
.tag.ghost.on{background:var(--s3);color:var(--t1);border-color:var(--bd3)}
.tag.war{color:var(--re);border-color:var(--reg);background:var(--red);animation:pulse 1.5s infinite}

/* ══ OANDA CHART CARD ══════════════════════════════════ */
.chart-head{padding:13px 16px 10px;border-bottom:1px solid var(--bd)}
.chart-sym-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.chart-sym{font-size:18px;font-weight:700;letter-spacing:-.02em}
.atab{padding:3px 10px;border-radius:5px;font-size:10px;font-family:var(--fm);font-weight:600;cursor:pointer;transition:all .13s;border:1px solid var(--bd2);color:var(--t2);background:var(--s3)}
.atab:hover{border-color:var(--bd3);color:var(--t1)}
.atab.on{background:var(--vd);border-color:var(--vg);color:var(--v2)}
.chart-pr{display:flex;align-items:flex-end;gap:10px;margin-bottom:10px}
.cpr-val{font-size:26px;font-weight:700;font-family:var(--fm);letter-spacing:-.02em}
.cpr-chg{font-size:13px;font-weight:600;font-family:var(--fm);margin-bottom:4px}
.cpr-chg.up{color:var(--em)}.cpr-chg.dn{color:var(--re)}
.brow{display:flex;gap:8px;flex-wrap:wrap}
.bchip{display:flex;align-items:center;gap:6px;padding:5px 11px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid;cursor:pointer;transition:opacity .13s}
.bchip:hover{opacity:.8}
.bchip.bull{background:var(--emd);border-color:var(--emg);color:var(--em)}
.bchip.bear{background:var(--red);border-color:var(--reg);color:var(--re)}
.bchip.neut{background:var(--amd);border-color:var(--amg);color:var(--am)}
.bchip .blbl{font-size:9px;font-weight:400;opacity:.7;margin-right:1px}
.chart-ai{padding:9px 16px;background:rgba(99,102,241,.05);border-bottom:1px solid var(--bd);font-size:11.5px;line-height:1.7;color:var(--t2)}
.chart-ai strong{color:var(--v2)}
.chart-frame{position:relative;height:280px;background:var(--s1)}
.chart-frame iframe{width:100%;height:100%;border:none;display:block}
.tf-row{position:absolute;top:8px;right:10px;display:flex;gap:4px;z-index:10}
.tf{padding:3px 9px;border-radius:4px;font-size:10px;font-family:var(--fm);color:var(--t2);background:rgba(12,14,20,.88);border:1px solid var(--bd);cursor:pointer;transition:all .13s;backdrop-filter:blur(6px)}
.tf:hover{border-color:var(--bd2);color:var(--t1)}
.tf.on{background:var(--vd);border-color:var(--vg);color:var(--v2)}

/* ══ SENTIMENT GAUGE ═══════════════════════════════════ */
.gauge-body{padding:14px}
.gauge-desc{font-size:11.5px;line-height:1.7;color:var(--t2);margin-bottom:13px}
.gauge-desc strong{color:var(--t1)}
.gauge-main{display:flex;align-items:flex-start;gap:14px}
.gauge-g{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
.gauge-svg{position:relative;width:130px;height:78px}
.gauge-num{position:absolute;bottom:2px;left:0;right:0;text-align:center;font-family:var(--fm);font-size:22px;font-weight:700}
.gauge-lbl{font-family:var(--fm);font-size:11px;font-weight:600;padding:4px 12px;border-radius:5px;margin-top:6px;cursor:pointer;transition:all .13s}
.gauge-facts{flex:1;display:flex;flex-direction:column;gap:5px}
.gf{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t2);padding:4px 6px;border-radius:5px;cursor:pointer;transition:background .13s}
.gf:hover{background:var(--s3)}
.gfd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.gfp{font-family:var(--fm);font-size:10px;color:var(--t3);margin-left:auto}

/* ══ AI INSIGHT BAR ════════════════════════════════════ */
.ai-bar{padding:12px 14px;background:linear-gradient(90deg,rgba(99,102,241,.07),rgba(99,102,241,.02));border-bottom:1px solid var(--bd);display:flex;gap:12px;align-items:flex-start}
.ai-icon{width:28px;height:28px;border-radius:50%;background:var(--vd);border:1px solid var(--vg);display:flex;align-items:center;justify-content:center;color:var(--v2);font-size:12px;flex-shrink:0;margin-top:1px}
.ai-content{flex:1;min-width:0}
.ai-label{font-family:var(--fm);font-size:9px;letter-spacing:.15em;color:var(--v2);text-transform:uppercase;margin-bottom:4px}
.ai-text{font-size:12px;line-height:1.7;color:var(--t2)}
.ai-text strong{color:var(--t1)}
.ai-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.aitag{font-family:var(--fm);font-size:9px;padding:2px 8px;border-radius:20px;border:1px solid;cursor:pointer}
.aitag.p{color:var(--v2);border-color:var(--vg);background:var(--vd)}
.aitag.g{color:var(--em);border-color:var(--emg);background:var(--emd)}
.aitag.r{color:var(--re);border-color:var(--reg);background:var(--red)}
.aitag.y{color:var(--am);border-color:var(--amg);background:var(--amd)}
.aitag.n{color:var(--t2);border-color:var(--bd2)}
.ai-metrics{flex-shrink:0;display:flex;flex-direction:column;gap:8px;width:160px}
.aim{display:flex;flex-direction:column;gap:2px}
.aim-l{font-family:var(--fm);font-size:8px;letter-spacing:.12em;color:var(--t3);text-transform:uppercase}
.aim-v{font-family:var(--fm);font-size:11px;font-weight:600}
.aim-v.p{color:var(--em)}.aim-v.n{color:var(--re)}.aim-v.z{color:var(--am)}

/* ══ FEED FILTERS ══════════════════════════════════════ */
.ffilters{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:8px 14px;border-bottom:1px solid var(--bd)}
.ff{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--bd);background:none;color:var(--t3);transition:all .13s}
.ff:hover{color:var(--t2);border-color:var(--bd2)}
.ff.on{background:var(--vd);border-color:var(--vg);color:var(--v2)}

/* ══ NEWS ITEM ══════════════════════════════════════════ */
.ni{display:flex;gap:11px;padding:11px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .13s}
.ni:hover{background:var(--s3)}
.ni:last-child{border-bottom:none}
.ni-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ni-dot.brk{background:var(--re);box-shadow:0 0 6px var(--re);animation:pulse 1s infinite}
.ni-dot.war{background:#dc2626;box-shadow:0 0 6px #dc2626;animation:pulse 1.2s infinite}
.ni-dot.hot{background:var(--or);box-shadow:0 0 4px var(--or)}
.ni-dot.norm{background:var(--bd3)}
.ni-bd{flex:1;min-width:0}
.ni-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;font-family:var(--fm);letter-spacing:.04em;border:1px solid}
.badge.brk{color:var(--re);border-color:var(--reg);background:var(--red)}
.badge.hot{color:var(--or);border-color:rgba(249,115,22,.3);background:var(--ord)}
.badge.war{color:#fca5a5;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.1)}
.badge.hi{color:#fca5a5;border-color:rgba(239,68,68,.2);background:rgba(239,68,68,.06)}
.ni-time,.ni-src{font-size:10px;color:var(--t3);font-family:var(--fm)}
.ni-title{font-size:12.5px;font-weight:500;line-height:1.45;color:var(--t1);margin-bottom:7px}
.ni-title .kw{color:var(--v2);font-weight:600}
.ni-title .wkw{color:#fca5a5;font-weight:600}
.ni-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px}
.ntag{padding:2px 7px;border-radius:4px;font-size:10px;font-family:var(--fm);font-weight:500;border:1px solid;cursor:pointer}
.ntag.forex{color:var(--v2);border-color:var(--vg);background:var(--vd)}
.ntag.gold{color:var(--am);border-color:var(--amg);background:var(--amd)}
.ntag.crypto{color:#a78bfa;border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.08)}
.ntag.macro{color:var(--em);border-color:var(--emg);background:var(--emd)}
.ntag.war{color:#fca5a5;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.08)}
.nbias{padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:var(--fm);border:1px solid;cursor:pointer}
.nbias.bull{color:var(--em);border-color:var(--emg);background:var(--emd)}
.nbias.bear{color:var(--re);border-color:var(--reg);background:var(--red)}
.nbias.neut{color:var(--am);border-color:var(--amg);background:var(--amd)}
.ni-ai{font-size:10.5px;line-height:1.55;color:var(--t3);padding:6px 9px;background:var(--s1);border-radius:5px;border:1px solid var(--bd);cursor:pointer;transition:background .13s;margin-top:2px}
.ni-ai:hover{background:var(--s3);color:var(--t2)}
.ni-ai strong{color:var(--v2)}

/* ══ MARKET NEWS ════════════════════════════════════════ */
.mn{padding:11px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .13s}
.mn:hover{background:var(--s3)}.mn:last-child{border-bottom:none}
.mn-t{font-size:12px;font-weight:600;color:var(--v2);line-height:1.4;margin-bottom:3px}
.mn-b{font-size:11px;line-height:1.5;color:var(--t2);margin-bottom:3px}
.mn-m{font-size:10px;color:var(--t3);font-family:var(--fm);display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ══ TRUMP ══════════════════════════════════════════════ */
.tp{padding:10px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .13s}
.tp:hover{background:var(--s3)}.tp:last-child{border-bottom:none}
.tp-h{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.tp-av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#7f1d1d,#b91c1c);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;border:1px solid rgba(245,158,11,.4);flex-shrink:0}
.tp-nm{font-family:var(--fm);font-size:10px;font-weight:600;color:#f59e0b}
.tp-bg{font-size:8px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#f59e0b;padding:1px 6px;border-radius:3px;font-family:var(--fm)}
.tp-tm{font-family:var(--fm);font-size:9px;color:var(--t3);margin-left:auto}
.tp-txt{font-size:11.5px;line-height:1.45;color:var(--t1);font-style:italic;margin-bottom:5px}
.tpbias{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;font-family:var(--fm);border:1px solid}
.tpbias.bull{color:var(--em);border-color:var(--emg);background:var(--emd)}
.tpbias.bear{color:var(--re);border-color:var(--reg);background:var(--red)}
.tpbias.neut{color:var(--am);border-color:var(--amg);background:var(--amd)}

/* ══ CALENDAR ═══════════════════════════════════════════ */
.ev{display:flex;align-items:flex-start;gap:9px;padding:8px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .13s}
.ev:hover{background:var(--s3)}.ev:last-child{border-bottom:none}
.ev.past{opacity:.3}.ev.live{background:rgba(16,185,129,.04);border-left:2px solid var(--em)}
.ev-fl{font-size:13px;flex-shrink:0;margin-top:1px}
.ev-tm{font-family:var(--fm);font-size:10px;color:var(--t3);min-width:40px;flex-shrink:0;padding-top:1px}
.ev-bd{flex:1;min-width:0}
.ev-nm{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:2px}
.ev-meta{display:flex;gap:8px;font-family:var(--fm);font-size:10px;flex-wrap:wrap}
.ev-act{color:var(--em);font-weight:600}.ev-fc{color:var(--t2)}.ev-pv{color:var(--t3)}
.ev-imp{display:flex;gap:2px;align-items:center;flex-shrink:0;padding-top:2px}
.ed{width:5px;height:5px;border-radius:50%;background:var(--bd3)}
.ed.H{background:var(--re)}.ed.M{background:var(--am)}.ed.L{background:var(--em)}

/* ══ PLAYBOOK ═══════════════════════════════════════════ */
.pb-wrap{padding:13px 14px}
.pb-ev{font-size:13px;font-weight:700;margin-bottom:4px}
.pb-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.pb-imp{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;font-family:var(--fm);border:1px solid}
.pb-imp.H{color:var(--re);border-color:var(--reg);background:var(--red)}

<script>
'use strict';
// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let S={
  articles:[],mkt:{},hist:{},
  sound:false,notifs:false,
  cd:30,cdTimer:null,
  seenBrk:new Set(),
  curPage:'home',
  newsFilter:'all',
  warFilter:'all',
  forexFilter:'all',
  cryptoFilter:'all',
  goldFilter:'all',
  mktTab:'recent',
};
const HLEN=50;
const AC=new(window.AudioContext||window.webkitAudioContext||function(){
  return{createOscillator:()=>({connect:()=>{},start:()=>{},stop:()=>{},type:'sine',frequency:{setValueAtTime:()=>{},exponentialRampToValueAtTime:()=>{}}}),createGain:()=>({connect:()=>{},gain:{setValueAtTime:()=>{},exponentialRampToValueAtTime:()=>{}}}),currentTime:0,destination:{}};
})();

// ══════════════════════════════════════════════════════
// NAV — The fix: replace innerHTML, never show/hide multiple pages
// ══════════════════════════════════════════════════════
function nav(page){
  // hide old, show new
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.sn').forEach(n=>n.classList.remove('on'));
  const el=document.getElementById('page-'+page);
  const sn=document.getElementById('sn-'+page);
  if(el) el.classList.add('show');
  if(sn) sn.classList.add('on');
  S.curPage=page;
  renderPage(page);
}

function renderPage(page){
  const renders={
    home:renderHome, news:renderNews, gold:renderGold,
    forex:renderForex, crypto:renderCrypto, calendar:renderCalendar,
    trump:renderTrump, war:renderWar
  };
  if(renders[page]) renders[page]();
}

// ══════════════════════════════════════════════════════
// TIME
// ══════════════════════════════════════════════════════
function initDate(){
  const d=new Date();
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const nth=n=>{const s=['th','st','nd','rd'],v=n%100;return n+(s[(v-20)%10]||s[v]||s[0]);};
  document.getElementById('g-date').textContent=`${days[d.getDay()]}, ${months[d.getMonth()]} ${nth(d.getDate())}, ${d.getFullYear()}`;
}
function ago(d){
  const s=Math.floor((Date.now()-d.getTime())/1e3);
  if(s<5)return 'just now';
  if(s<60)return s+'s ago';
  if(s<3600)return Math.floor(s/60)+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function fmtFull(d){return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtShort(d){return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});}
// Live tick every 20s
setInterval(()=>document.querySelectorAll('[data-ts]').forEach(el=>{
  const t=+el.getAttribute('data-ts');if(t)el.textContent=ago(new Date(t));
}),20000);

// ══════════════════════════════════════════════════════
// BIAS ENGINE
// ══════════════════════════════════════════════════════
const BR={
  gold:[['gold rally','gold surge','xau rises','gold gains','gold hits','gold up','gold bull','rate cut','dovish','safe haven','inflation surge','geopolitical','war','crisis','gold record','bullion rally','precious metals'],['gold falls','gold drops','gold slips','gold lower','gold bear','rate hike','hawkish','dollar surges','yields rise','risk appetite','gold retreats','gold declines']],
  usd:[['dollar strength','hawkish fed','rate hike','strong jobs','beat expectations','dollar bull','usd gains','greenback','dxy up','fomc hawkish','dollar surges'],['dollar weakness','dovish fed','rate cut','weak jobs','missed expectations','dollar bear','usd slides','greenback falls','tariff uncertainty','dollar lower','dxy drops']],
  eur:[['eur rises','euro gains','euro bull','ecb hike','euro strength','eurusd gains','euro rallies','euro climbs'],['eur falls','euro drops','euro bear','ecb cut','euro weakness','eurusd lower','euro slides','euro weakens']],
  gbp:[['gbp rises','pound gains','cable up','boe hike','pound bull','sterling rises','gbp strength'],['gbp falls','pound drops','cable falls','boe cut','pound bear','sterling drops','pound weakens']],
  jpy:[['yen rises','jpy gains','yen strength','boj hike','yen bull','yen firms','yen rallies'],['yen falls','yen weakness','jpy drops','boj hold','yen bear','yen slides','yen weakens']],
  btc:[['bitcoin rises','btc rally','bitcoin bull','crypto rally','btc gains','bitcoin surge','etf inflow','btc up','bitcoin record','halving','crypto gains'],['bitcoin falls','btc drops','bitcoin bear','crypto sell','btc lower','bitcoin crash','crypto down','btc declining']],
  oil:[['oil rises','crude up','opec cut','oil rally','crude gains','wti up','oil climbs','brent up'],['oil falls','crude drops','opec increase','oil lower','crude declines','wti falls','oil slumps']],
};
function calcBias(title,desc,cat){
  const txt=(title+' '+(desc||'')).toLowerCase();
  let asset='MACRO',cls='neut',label='◆ NEUTRAL';
  const sc=r=>({b:r[0].filter(k=>txt.includes(k)).length,r:r[1].filter(k=>txt.includes(k)).length});
  const ap=(name,rules)=>{const s=sc(rules);asset=name;if(s.b>s.r){cls='bull';label=`▲ ${name} BULLISH`;}else if(s.r>s.b){cls='bear';label=`▼ ${name} BEARISH`;}else{cls='neut';label=`◆ ${name} NEUTRAL`;}};
  if(cat==='gold'||/\b(gold|xau|xag|silver|bullion)\b/.test(txt))ap('GOLD',BR.gold);
  else if(/\b(bitcoin|btc)\b/.test(txt))ap('BTC',BR.btc);
  else if(/\b(ethereum|eth)\b/.test(txt))ap('ETH',BR.btc);
  else if(cat==='crypto'||/\b(crypto|blockchain|defi|altcoin)\b/.test(txt))ap('CRYPTO',BR.btc);
  else if(/\b(euro|eur)\b/.test(txt))ap('EUR',BR.eur);
  else if(/\b(pound|gbp|sterling|cable)\b/.test(txt))ap('GBP',BR.gbp);
  else if(/\b(yen|jpy)\b/.test(txt))ap('JPY',BR.jpy);
  else if(/\b(oil|crude|wti|brent|opec)\b/.test(txt))ap('OIL',BR.oil);
  else if(/\b(dollar|usd|fed|fomc|greenback|dxy)\b/.test(txt))ap('USD',BR.usd);
  else if(cat==='trump'){asset='USD';if(/tariff|trade war|sanction/.test(txt)){cls='bear';label='▼ USD BEARISH';}else if(/deal|growth|cut/.test(txt)){cls='bull';label='▲ USD BULLISH';}else{cls='neut';label='◆ USD NEUTRAL';}}
  else if(cat==='war'){asset='GOLD';if(/\b(escalat|attack|missile|invasion|airstrike)\b/.test(txt)){cls='bull';label='▲ GOLD BULLISH';}else if(/ceasefire|peace|deal/.test(txt)){cls='bear';label='▼ GOLD BEARISH';}else{cls='neut';label='◆ GOLD NEUTRAL';}}
  else{const p=['growth','beat','strong','rally','gains','recovery','optimism'].filter(k=>txt.includes(k)).length;const n=['recession','weak','miss','crisis','fear','decline','contraction'].filter(k=>txt.includes(k)).length;if(p>n){cls='bull';label='▲ MACRO BULLISH';}else if(n>p){cls='bear';label='▼ MACRO BEARISH';}}
  return{cls,label,asset};
}

function isWar(a){return /\b(war|conflict|attack|missile|invasion|airstrike|sanction|military|troops|nato|ceasefire|explosion|bombing|terrorist|nuclear|ukraine|russia|israel|hamas|taiwan|escalat|shooting|wounded|killed|dead|blast)\b/.test((a.title+' '+(a.description||'')).toLowerCase());}
function isHI(a){return /\b(cpi|nfp|fomc|federal reserve|inflation|rate hike|rate cut|gdp|payroll|powell|lagarde|hawkish|dovish|breaking|emergency|war|attack|sanctions|recession|tariff|default|crash|collapse)\b/.test((a.title+' '+(a.description||'')).toLowerCase());}
function isBrk(a){return(Date.now()-a.date.getTime())<5*60*1000;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ══════════════════════════════════════════════════════
// PREDICT (rule-based AI)
// ══════════════════════════════════════════════════════
function predict(title,desc,b){
  const txt=(title+' '+(desc||'')).toLowerCase();
  const M={
    GOLD:{bull:{d:'GOLD ▲ UP',r:'$15–$40 target',w:'Safe-haven flows + inflation hedge demand driving price higher.'},bear:{d:'GOLD ▼ DOWN',r:'$10–$30 pullback',w:'Risk-on rotation + USD strength weighing on gold.'},neut:{d:'GOLD ◆ RANGE',r:'±$12 consolidation',w:'Conflicting signals — await directional catalyst.'}},
    BTC:{bull:{d:'BTC ▲ UP',r:'+$2K–$6K target',w:'ETF inflows + institutional demand + halving cycle bullish.'},bear:{d:'BTC ▼ DOWN',r:'-$2K–$5K pullback',w:'Risk-off pressure + outflows. Reduce exposure.'},neut:{d:'BTC ◆ CONSOLIDATION',r:'±$2K range',w:'Awaiting catalyst. Watch ETF flow data.'}},
    ETH:{bull:{d:'ETH ▲ UP',r:'+$100–$250',w:'BTC correlation + protocol upgrades driving demand.'},bear:{d:'ETH ▼ DOWN',r:'-$100–$200',w:'Risk-off + BTC weakness pulling ETH lower.'},neut:{d:'ETH ◆ RANGE',r:'±$100',w:'Tracking BTC — follow Bitcoin direction.'}},
    USD:{bull:{d:'USD ▲ STRONG',r:'DXY +0.4–0.8',w:'Hawkish Fed + strong data boosting greenback.'},bear:{d:'USD ▼ WEAK',r:'DXY -0.4–0.9',w:'Dovish pivot + tariff uncertainty weighing on dollar.'},neut:{d:'USD ◆ MIXED',r:'DXY ±0.2',w:'Await clear data catalyst for direction.'}},
    EUR:{bull:{d:'EUR ▲ UP',r:'+30–70 pips',w:'ECB hawkish signals or eurozone data beat driving EUR.'},bear:{d:'EUR ▼ DOWN',r:'-30–70 pips',w:'ECB dovish shift or USD strength pulling EUR lower.'},neut:{d:'EUR ◆ RANGE',r:'±25 pips',w:'Watch ECB speakers for next directional catalyst.'}},
    GBP:{bull:{d:'GBP ▲ UP',r:'+40–80 pips',w:'BoE hawkish + UK data beat lifting sterling.'},bear:{d:'GBP ▼ DOWN',r:'-40–80 pips',w:'BoE dovish + risk-off dragging cable lower.'},neut:{d:'GBP ◆ RANGE',r:'±30 pips',w:'Await BoE guidance for clear direction.'}},
    JPY:{bull:{d:'JPY ▲ STRONGER',r:'USD/JPY -80–150 pips',w:'BoJ hike expectations + risk-off boosting safe-haven yen.'},bear:{d:'JPY ▼ WEAKER',r:'USD/JPY +80–150 pips',w:'BoJ on hold + yield differential driving yen lower.'},neut:{d:'JPY ◆ RANGE',r:'USD/JPY ±50 pips',w:'BoJ ambiguity keeping pair range-bound.'}},
    OIL:{bull:{d:'OIL ▲ UP',r:'+$1.5–$4',w:'OPEC+ supply cut or geopolitical supply risk premium.'},bear:{d:'OIL ▼ DOWN',r:'-$1.5–$3',w:'Demand fears or OPEC+ output increase pressuring crude.'},neut:{d:'OIL ◆ RANGE',r:'±$1.5',w:'Watch EIA inventory data for directional catalyst.'}},
    CRYPTO:{bull:{d:'CRYPTO ▲ UP',r:'Variable — BTC leads',w:'Risk-on + ETF flows + institutional buying.'},bear:{d:'CRYPTO ▼ DOWN',r:'Variable — follow BTC',w:'Risk-off rotation. Reduce exposure, watch BTC dominance.'},neut:{d:'CRYPTO ◆ WAIT',r:'Consolidating',w:'Awaiting clear macro or on-chain catalyst.'}},
    MACRO:{bull:{d:'RISK-ON ▲',r:'Equities + crypto UP',w:'Positive macro backdrop supports growth assets.'},bear:{d:'RISK-OFF ▼',r:'Safe havens UP',w:'Macro deterioration driving defensive positioning.'},neut:{d:'WAIT ◆',r:'Mixed signals',w:'No clear macro direction. Stay patient, reduce size.'}},
  };
  const am=M[b.asset]||M.MACRO;const m=am[b.cls]||am.neut;
  // Add context from keywords
  let extra='';
  if(/\bcpi\b/.test(txt))extra=' Watch deviation vs forecast — even 0.1% surprise moves markets 60–100 pips.';
  else if(/\bnfp\b/.test(txt))extra=' Wait 3–5 candles post-release — initial move is often 50–80% reversed.';
  else if(/\bfomc\b|\bpowell\b/.test(txt))extra=' The real move comes after the press conference, not the headline decision.';
  else if(/war|attack|invasion/.test(txt))extra=' Geopolitical spikes are fast — trail stops tightly, take partial profits early.';
  else if(/tariff|trade war/.test(txt))extra=' Trade policy uncertainty creates sustained vol — not just a 1-hour play.';
  return{...m,extra};
}

// Asset tags for a news item
function assetTags(a){
  const txt=(a.title+' '+(a.description||'')).toLowerCase();
  const tags=[];
  if(/\b(gold|xau)\b/.test(txt))tags.push({l:'XAUUSD',c:'gold'});
  if(/\b(euro|eur)\b/.test(txt))tags.push({l:'EURUSD',c:'forex'});
  if(/\b(pound|gbp|cable)\b/.test(txt))tags.push({l:'GBPUSD',c:'forex'});
  if(/\b(yen|jpy)\b/.test(txt))tags.push({l:'USDJPY',c:'forex'});
  if(/\b(bitcoin|btc)\b/.test(txt))tags.push({l:'BTC',c:'crypto'});
  if(/\b(ethereum|eth)\b/.test(txt))tags.push({l:'ETH',c:'crypto'});
  if(/\b(dollar|usd|fed|fomc)\b/.test(txt))tags.push({l:'USD',c:'macro'});
  if(/\b(oil|crude|wti|brent)\b/.test(txt))tags.push({l:'OIL',c:'gold'});
  if(isWar(a))tags.push({l:'WAR',c:'war'});
  return tags.slice(0,4);
}

// Highlight keywords in headline
function hlTitle(t){
  let s=esc(t);
  [['FED','FEDERAL RESERVE','FOMC','POWELL','ECB','BOE','BOJ'],['CPI','NFP','INFLATION','PAYROLL','EMPLOYMENT'],['GOLD','XAU','SILVER','BULLION'],['BITCOIN','BTC','CRYPTO','ETH','ETHEREUM'],['USD','DOLLAR','DXY']].forEach(g=>g.forEach(k=>{s=s.replace(new RegExp(`\\b(${k})\\b`,'gi'),'<span class="kw">$1</span>');}));
  ['WAR','ATTACK','INVASION','MISSILE','AIRSTRIKE','EXPLOSION','TERRORIST','BOMB','KILLED','BLAST'].forEach(k=>{s=s.replace(new RegExp(`\\b(${k})\\b`,'gi'),'<span class="wkw">$1</span>');});
  return s;
}

// ══════════════════════════════════════════════════════
// NEWS ITEM RENDERER
// ══════════════════════════════════════════════════════
function renderNI(a,idx){
  const brk=isBrk(a),hi=isHI(a),war=isWar(a);
  const b=a.bias;
  const pred=predict(a.title,a.description,b);
  const tags=assetTags(a);
  const ts=a.date.getTime();
  const dotCls=brk?'brk':war?'war':hi?'hot':'norm';
  return `<div class="ni" onclick="openNewsModal(${idx})">
    <div class="ni-dot ${dotCls}"></div>
    <div class="ni-bd">
      <div class="ni-meta">
        ${brk?'<span class="badge brk">🔴 BREAKING</span>':''}
        ${war&&!brk?'<span class="badge war">⚔️ WAR</span>':''}
        ${hi&&!brk&&!war?'<span class="badge hot">🔥 HOT</span>':''}
        ${hi?'<span class="badge hi">HIGH IMPACT</span>':''}
        <span class="ni-time" data-ts="${ts}">${ago(a.date)}</span>
        <span style="color:var(--bd3)">·</span>
        <span class="ni-src">${esc(a.source)}</span>
      </div>
      <div class="ni-title">${hlTitle(a.title)}</div>
      <div class="ni-row">
        ${tags.map(t=>`<span class="ntag ${t.c}" onclick="event.stopPropagation();nav('${t.c==='war'?'war':t.c==='crypto'?'crypto':t.c==='gold'?'gold':'forex'}')">${t.l}</span>`).join('')}
        <span class="nbias ${b.cls}" onclick="event.stopPropagation();openNewsModal(${idx})">${b.label}</span>
      </div>
      <div class="ni-ai" onclick="event.stopPropagation();openNewsModal(${idx})"><strong>AI:</strong> ${pred.d} · ${pred.r} — ${pred.w}</div>
    </div>
  </div>`;
}

const SKEYS={bull_usd:['dollar strength','hawkish fed','rate hike','strong jobs','beat expectations','dollar surges'],bear_usd:['dollar weakness','dovish fed','rate cut','weak jobs','tariff','dollar falls'],gold_up:['gold rally','safe haven','gold surge','inflation surge','geopolitical','war','crisis','gold record'],gold_dn:['gold falls','risk-on','strong dollar','yields rise'],crypto_up:['bitcoin rally','btc surge','crypto up','etf inflow','bitcoin bull'],crypto_dn:['bitcoin falls','crypto crash','btc drops'],risk_on:['rally','surge','record high','optimism','recovery','growth'],risk_off:['sell-off','plunge','crisis','fear','collapse','war','sanctions']};
function updateAIBar(){
  const txt=S.articles.slice(0,25).map(a=>a.title.toLowerCase()).join(' ');
  let u=0,g=0,c=0,r=0;
  SKEYS.bull_usd.forEach(k=>{if(txt.includes(k))u++;});SKEYS.bear_usd.forEach(k=>{if(txt.includes(k))u--;});
  SKEYS.gold_up.forEach(k=>{if(txt.includes(k))g++;});SKEYS.gold_dn.forEach(k=>{if(txt.includes(k))g--;});
  SKEYS.crypto_up.forEach(k=>{if(txt.includes(k))c++;});SKEYS.crypto_dn.forEach(k=>{if(txt.includes(k))c--;});
  SKEYS.risk_on.forEach(k=>{if(txt.includes(k))r++;});SKEYS.risk_off.forEach(k=>{if(txt.includes(k))r--;});
  const set=(id,v,pos,neg,zero)=>{const el=document.getElementById(id);if(!el)return;if(v>0){el.className='aim-v p';el.textContent=pos;}else if(v<0){el.className='aim-v n';el.textContent=neg;}else{el.className='aim-v z';el.textContent=zero;}};
  set('ai-usd',u,'BULLISH','BEARISH','MIXED');set('ai-gold',g,'UPSIDE','DOWNSIDE','NEUTRAL');set('ai-crypto',c,'BULL','BEAR','SIDEWAYS');set('ai-risk',r,'RISK-ON','RISK-OFF','NEUTRAL');
  const bulls=S.articles.filter(a=>a.bias?.cls==='bull').length,bears=S.articles.filter(a=>a.bias?.cls==='bear').length;
  let summary='';
  summary+=u>1?'Dollar holding strength on hawkish Fed narrative. ':u<-1?'Dollar under pressure — dovish signals and tariff fears weighing. ':'Dollar mixed, awaiting clear catalyst. ';
  summary+=g>0?'Gold finding safe-haven bids on macro uncertainty and geopolitical risk. ':g<0?'Gold facing headwinds as risk appetite firms. ':'Gold consolidating near key technical levels. ';
  summary+=c>0?'Crypto broadly bullish on ETF demand and institutional flows. ':c<0?'Crypto facing risk-off headwinds. ':'';
  summary+=r<-1?'Risk-off dominant — defensives and safe-havens preferred. ':r>1?'Risk-on environment — growth assets outperforming. ':'';
  summary+=`Scanning ${S.articles.length} live articles: ${bulls} bullish vs ${bears} bearish signals detected.`;
  const txtEl=document.getElementById('h-ai-text');if(txtEl)txtEl.innerHTML=summary.replace(/\./g,'.</span> ').replace(/^/,'<span>').replace(/ (Dollar|Gold|Crypto|Risk-off|Risk-on|Scanning)/g,' <strong>$1</strong>');
  const tags=[];
  if(u>1)tags.push({l:'USD STRENGTH',c:'p'});else if(u<-1)tags.push({l:'USD WEAKNESS',c:'r'});
  if(g>0)tags.push({l:'GOLD UPSIDE',c:'y'});
  if(c>0)tags.push({l:'BTC BULLISH',c:'g'});else if(c<0)tags.push({l:'BTC BEARISH',c:'r'});
  if(r<-1)tags.push({l:'RISK-OFF',c:'r'});if(r>1)tags.push({l:'RISK-ON',c:'g'});
  const hi=S.articles.filter(isHI).length;
  if(hi>2)tags.push({l:hi+' HIGH IMPACT',c:'r'});
  tags.push({l:`${bulls}▲ ${bears}▼`,c:'n'});
  const tagsEl=document.getElementById('h-ai-tags');if(tagsEl)tagsEl.innerHTML=tags.map(t=>`<span class="aitag ${t.c}">${t.l}</span>`).join('');
}

async function fetchPrices(){
  try{
    const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd&include_24hr_change=true',{cache:'no-store'});
    const d=await r.json();
    S.mkt.btc={p:d.bitcoin?.usd,c:d.bitcoin?.usd_24h_change};
    S.mkt.eth={p:d.ethereum?.usd,c:d.ethereum?.usd_24h_change};
    S.mkt.sol={p:d.solana?.usd,c:d.solana?.usd_24h_change};
  }catch(e){}
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD',{cache:'no-store'});
    const d=await r.json();
    if(d.rates){
      const eur=1/d.rates.EUR,gbp=1/d.rates.GBP,jpy=d.rates.JPY;
      const upd=(k,v)=>{if(!S.mkt[k])S.mkt[k]={p:v,c:0};else{const pp=S.mkt[k].p;S.mkt[k]={p:v,c:((v-pp)/pp)*100};}};
      upd('eur',eur);upd('gbp',gbp);upd('jpy',jpy);
    }
  }catch(e){}
  const rnd=(v,sp)=>v+(Math.random()-.5)*sp;

function detectCat(t,def){const l=t.toLowerCase();for(const[c,ks]of Object.entries(CATK))if(ks.some(k=>l.includes(k)))return c;return def;}

async function fetchOneRSS(src){
  for(const proxy of PROXIES){
    try{
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(proxy(src.url),{cache:'no-store',signal:ctrl.signal});
      clearTimeout(tid);if(!r.ok)continue;
      const ct=r.headers.get('content-type')||'';
      let xmlStr='';
      if(ct.includes('json')){const j=await r.json();xmlStr=j.contents||j.content||'';}
      else xmlStr=await r.text();
      if(!xmlStr||xmlStr.length<100)continue;
      const xml=new DOMParser().parseFromString(xmlStr,'text/xml');
      const items=Array.from(xml.querySelectorAll('item')).slice(0,15);
      if(!items.length)continue;
      return items.map(i=>{
        const title=(i.querySelector('title')?.textContent||'').trim().replace(/<!\[CDATA\[|\]\]>/g,'').replace(/<[^>]*>/g,'');
        const link=(i.querySelector('link')?.textContent||'#').trim();
        const pub=(i.querySelector('pubDate')?.textContent||'').trim();
        const descRaw=(i.querySelector('description')?.textContent||'').trim();
        const desc=descRaw.replace(/<[^>]*>/g,'').replace(/&[a-z#0-9]+;/g,' ').replace(/\s+/g,' ').slice(0,280);
        const date=pub?new Date(pub):new Date();
        if(isNaN(date.getTime())||!title||title.length<10)return null;
        const cat=detectCat(title+' '+desc,src.cat);
        const b=calcBias(title,desc,cat);
        return{title,link,date,source:src.name,category:cat,description:desc,bias:b,id:(title+src.name).slice(0,55)};
      }).filter(Boolean);
    }catch(e){continue;}
  }
  return[];
}

  const hi=imp==='H';
  document.getElementById('mbody').innerHTML=`<div class="move-card"><div class="mc-t">EVENT DATA</div><div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:6px">${[{l:'Currency',v:cur},{l:'Impact',v:imp==='H'?'HIGH':imp==='M'?'MEDIUM':'LOW'},{l:'Forecast',v:fc},{l:'Actual',v:act},{l:'Previous',v:pv}].map(i=>`<div><div class="ib-l">${i.l}</div><div class="ib-v ${i.l==='Actual'&&i.v!=='TBD'&&i.v!=='N/A'?'p':'z'}">${i.v}</div></div>`).join('')}</div></div><div class="msec"><div class="msec-t">How to Trade This</div><div class="msec-b">${hi?`<strong>HIGH IMPACT EVENT:</strong> Expect major volatility. Spreads widen 3–5x at release. Best approach: <strong>wait for the first 1–2 candles to complete</strong>, then enter on the first pullback in the direction of the data. The deviation from forecast is what matters — not the absolute level.`:`<strong>MEDIUM/LOW IMPACT:</strong> Less likely to cause significant moves unless it dramatically deviates. Use as confirming factor for existing positions, not a standalone entry trigger.`}</div></div><div class="edge"><div class="edge-t">⚠ TIMING NOTE</div><div class="edge-b">Mark the release time on your chart. If already in a trade, consider <strong>reducing size or moving stop to breakeven</strong> 5 minutes before. Never hold full position through a major event without a pre-defined plan for both outcomes.</div></div>`;
  openModal();
}

// ══════════════════════════════════════════════════════
// SOUND & NOTIFICATIONS
// ══════════════════════════════════════════════════════
function toggleSound(){
  S.sound=!S.sound;
  document.getElementById('snd-i').textContent=S.sound?'🔊':'🔇';
  document.getElementById('st-snd').textContent=S.sound?'🔊 Sound ON':'🔇 Sound OFF';
}
function playAlert(){
  if(!S.sound)return;
  try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type='sine';o.frequency.setValueAtTime(880,AC.currentTime);o.frequency.exponentialRampToValueAtTime(440,AC.currentTime+.15);g.gain.setValueAtTime(.2,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.4);o.start();o.stop(AC.currentTime+.4);}catch(e){}
}
function toggleNotif(){
  if(Notification.permission==='default'){Notification.requestPermission().then(p=>{if(p==='granted'){S.notifs=true;document.getElementById('ntf-i').textContent='🔔';document.getElementById('st-ntf').textContent='🔔 Alerts ON';document.getElementById('ndot').style.background='var(--em)';}});}
  else if(Notification.permission==='granted'){S.notifs=!S.notifs;document.getElementById('ntf-i').textContent=S.notifs?'🔔':'🔕';document.getElementById('st-ntf').textContent=S.notifs?'🔔 Alerts ON':'🔕 Alerts OFF';}
}
function sendNotif(a){
  if(!S.notifs||Notification.permission!=='granted')return;
  if(S.seenBrk.has(a.id))return;S.seenBrk.add(a.id);
  new Notification(isWar(a)?'⚔️ WAR ALERT — NEXUS EDGE':'🔴 BREAKING — NEXUS EDGE',{body:`${a.title}\n${a.bias?.label||''}`,tag:a.id});
}

// ══════════════════════════════════════════════════════
// MAIN REFRESH
// ══════════════════════════════════════════════════════
async function fullRefresh(){
  const ico=document.getElementById('ref-ico');if(ico){ico.classList.add('rot');}
  try{
    await fetchPrices();
    const results=await Promise.allSettled(RSS.map(s=>fetchOneRSS(s)));
    const fresh=results.flatMap(r=>r.status==='fulfilled'?r.value:[]);
    const seen=new Set();
    const deduped=fresh.filter(a=>{if(seen.has(a.id))return false;seen.add(a.id);return true;}).sort((a,b)=>b.date-a.date);
    if(deduped.length>5)S.articles=deduped;
    if(S.articles.length<8)injectDemo();
    S.articles.filter(a=>isBrk(a)&&!S.seenBrk.has(a.id)).forEach(a=>{playAlert();sendNotif(a);});
    renderPage(S.curPage);
    document.getElementById('st-upd').textContent='Updated: '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    document.getElementById('st-art').textContent=S.articles.length+' articles';
    document.getElementById('st-war').textContent=`⚔️ ${S.articles.filter(isWar).length} war`;
  }catch(e){injectDemo();renderPage(S.curPage);}
  finally{if(ico)ico.classList.remove('rot');}
}

// ══════════════════════════════════════════════════════
// COUNTDOWN
// ══════════════════════════════════════════════════════
function startCountdown(){
  S.cd=30;if(S.cdTimer)clearInterval(S.cdTimer);
  S.cdTimer=setInterval(()=>{
    S.cd--;document.getElementById('st-cd').textContent=`↻ ${S.cd}s`;
    if(S.cd<=0){fullRefresh();S.cd=30;}
  },1000);
}

// ══════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════
initDate();
injectDemo();
renderPage('home');
fullRefresh();
startCountdown();
document.addEventListener('visibilitychange',()=>{if(!document.hidden)fullRefresh();});
</script>
