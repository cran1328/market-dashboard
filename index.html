<!DOCTYPE html>
<html>
<head>
  <title>Pro Market Terminal</title>

  <style>
    body {
      margin:0;
      font-family: Inter, sans-serif;
      background:#020617;
      color:white;
    }

    header {
      padding:18px;
      text-align:center;
      font-size:22px;
      color:#38bdf8;
      border-bottom:1px solid #1e293b;
    }

    .tabs {
      display:flex;
      justify-content:center;
      gap:10px;
      padding:10px;
    }

    .tab {
      padding:8px 14px;
      border-radius:8px;
      background:#1e293b;
      cursor:pointer;
    }

    .active {
      background:#38bdf8;
      color:black;
    }

    .container {
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:20px;
      padding:20px;
    }

    .panel {
      background:#0f172a;
      border-radius:16px;
      padding:16px;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .badge {
      background:#1e293b;
      padding:6px 10px;
      border-radius:8px;
      font-size:12px;
    }

    .controls {
      display:flex;
      gap:8px;
    }

    button {
      background:#1e293b;
      color:white;
      border:none;
      padding:6px 10px;
      border-radius:6px;
      cursor:pointer;
    }

    #insight {
      background:#020617;
      padding:12px;
      border-radius:10px;
      margin-bottom:15px;
      line-height:1.6;
      color:#cbd5f5;
    }

    .news-card {
      display:flex;
      gap:15px;
      margin-bottom:15px;
      background:#020617;
      padding:12px;
      border-radius:12px;
      cursor:pointer;
      transition:0.2s;
    }

    .news-card:hover {
      background:#1e293b;
      transform:scale(1.02);
    }

    .news-card img {
      width:140px;
      height:90px;
      object-fit:cover;
      border-radius:10px;
    }

    .title {
      font-size:15px;
      font-weight:500;
    }

    .time {
      font-size:12px;
      color:#94a3b8;
      margin-top:6px;
    }

    .breaking {
      border-left:4px solid red;
      background:#3b0a0a;
    }

    @media(max-width:768px){
      .container{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>

<header>🏦 PRO MARKET TERMINAL</header>

<div class="tabs">
  <div class="tab active" onclick="setTab('all')">All</div>
  <div class="tab" onclick="setTab('forex')">Forex</div>
  <div class="tab" onclick="setTab('gold')">Gold</div>
  <div class="tab" onclick="setTab('crypto')">Crypto</div>
</div>

<div class="container">

  <!-- LEFT -->
  <div class="panel">

    <div class="topbar">
      <div class="badge">🤖 <span id="bias"></span></div>
      <div class="badge">💵 <span id="usd"></span></div>
      <div class="controls">
        <button onclick="toggleImpact()">🔥</button>
        <button onclick="run()">🔄</button>
      </div>
    </div>

    <div id="insight">Analyzing...</div>

    <div id="news"></div>

  </div>

  <!-- RIGHT -->
  <div class="panel">
    <h3>⚡ Breaking</h3>
    <div id="tweets"></div>
  </div>

</div>

<script>
let currentTab = "all";
let showHighImpact = false;

function setTab(tab){
  currentTab = tab;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");
  fetchNews();
}

function toggleImpact(){
  showHighImpact = !showHighImpact;
  fetchNews();
}

// ===== IMAGE FIX =====
function getImage(item){
  if(item.thumbnail) return item.thumbnail;
  if(item.description){
    const match = item.description.match(/<img.*?src="(.*?)"/);
    if(match) return match[1];
  }
  return "https://via.placeholder.com/140";
}

// ===== TIME =====
function formatTime(date){
  const diff = Math.floor((new Date()-date)/60000);
  if(diff<1) return "Just now 🔴";
  if(diff<60) return diff+" min ago";
  return Math.floor(diff/60)+" hr ago";
}

// ===== INSIGHT =====
function generateInsight(news){
  let text="";

  if(news.some(n=>n.includes("inflation"))) text+="📊 Inflation → Hawkish bias<br>";
  if(news.some(n=>n.includes("rate"))) text+="🏦 Rate sensitivity high<br>";
  if(news.some(n=>n.includes("war"))) text+="⚠️ Risk → Gold ↑<br>";

  document.getElementById("insight").innerHTML = text || "⚖️ No strong signals";
}

// ===== FILTER =====
function matchTab(title){
  if(currentTab==="forex") return title.includes("eur") || title.includes("usd");
  if(currentTab==="gold") return title.includes("gold") || title.includes("xau");
  if(currentTab==="crypto") return title.includes("bitcoin") || title.includes("crypto");
  return true;
}

// ===== NEWS =====
async function fetchNews(){
  const res = await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://www.fxstreet.com/rss/news&_="+Date.now());
  const data = await res.json();

  generateInsight(data.items.map(n=>n.title.toLowerCase()));

  const container=document.getElementById("news");
  container.innerHTML="";

  data.items.forEach(item=>{
    const title=item.title.toLowerCase();
    const time=new Date(item.pubDate);

    const isHigh = title.includes("cpi") || title.includes("nfp") || title.includes("fed");

    if(showHighImpact && !isHigh) return;
    if(!matchTab(title)) return;

    const div=document.createElement("div");
    div.className="news-card";

    if((new Date()-time)<120000) div.classList.add("breaking");

    div.onclick=()=>window.open(item.link);

    div.innerHTML=`
      <img src="${getImage(item)}">
      <div>
        <div class="title">${item.title}</div>
        <div class="time">${time.toLocaleTimeString()} • ${formatTime(time)}</div>
      </div>
    `;

    container.appendChild(div);
  });
}

// ===== BREAKING =====
async function fetchTweets(){
  const res=await fetch("https://api.rss2json.com/v1/api.json?rss_url=https://nitter.net/financialjuice/rss&_="+Date.now());
  const data=await res.json();

  const container=document.getElementById("tweets");
  container.innerHTML="";

  data.items.slice(0,6).forEach(item=>{
    const time=new Date(item.pubDate);

    const div=document.createElement("div");
    div.className="news-card";
    div.onclick=()=>window.open(item.link);

    div.innerHTML=`
      <div>
        <div class="title">${item.title}</div>
        <div class="time">${time.toLocaleTimeString()} • ${formatTime(time)}</div>
      </div>
    `;

    container.appendChild(div);
  });
}

// RUN
function run(){
  fetchNews();
  fetchTweets();
}

run();
setInterval(run,20000);
</script>

</body>
</html>
